server.port=8080
spring.application.name=real-estate-backend

# ─────────────────────────────────────────────
# Blockchain Configuration
# ─────────────────────────────────────────────
# Ganache RPC URL (must be running before starting backend)
blockchain.ganache.url=http://localhost:7545

# Deployed contract address — update this whenever you redeploy
blockchain.contract.address=0x55FA73a4196E48a947a24589B2e236154DF0E405

# ─────────────────────────────────────────────
# CORS — allow React frontend on port 5173
# ─────────────────────────────────────────────
spring.mvc.cors.allowed-origins=http://localhost:5173
